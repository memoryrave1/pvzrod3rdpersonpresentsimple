<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>mgmpppvz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --hud-h: 86px;

      --pit-x: 92%;
      --pit-y: 88%;
      --pit-w: 1240px;
      --pit-h: 720px;
      --pit-tilt: 14deg;

      --hero-x: 31%;
      --hero-y: 75%;
      --hero-w: 360px;

      --wand-x: 34.5%;
      --wand-y: 88.5%;
      --wand-w: 92px;
      --wand-rot: -22deg;

      --ui: rgba(15, 18, 28, .55);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --glass: blur(12px);
      --ease: cubic-bezier(.2,.8,.2,1);

      --good: #36d27c;
      --bad: #ff4d6d;
      --gold: rgba(255, 212, 102, .95);
      --goldGlow: rgba(255, 170, 0, .22);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Roboto Condensed", "Roboto", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      background:#0b0f17;
      color:var(--text);
      overflow:hidden;
      touch-action: manipulation;
    }

    .app{height:100%; display:flex; flex-direction:column;}

    .hud{
      height:var(--hud-h);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:14px 18px;
      gap:14px;
      position:relative;
      z-index:50;
      background: transparent;
      pointer-events:none;
    }
    .hud > *{ pointer-events:auto; }
    .rightHud{ display:flex; align-items:center; gap:10px; }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      background:var(--ui);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: var(--glass);
      border-radius:999px;
      box-shadow: var(--shadow);
      min-height:44px;
    }
    .pill .label{color:var(--muted); font-size:12px}

    .hearts{ display:flex; gap:6px; align-items:center; }
    .heart{
      width:10px; height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.22);
      box-shadow: 0 0 0 2px rgba(255,255,255,.10) inset;
    }
    .heart.on{
      background: var(--bad);
      box-shadow: 0 0 18px rgba(255,77,109,.45);
    }

    .collection{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      background:var(--ui);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: var(--glass);
      border-radius:999px;
      box-shadow: var(--shadow);
    }
    .collection .title{
      font-size:12px;
      color:var(--muted);
      margin-right:2px;
      white-space:nowrap;
    }
    .slots{display:flex; gap:8px; align-items:center;}
    .slot{
      width:34px; height:34px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      display:grid;
      place-items:center;
      overflow:hidden;
      position:relative;
    }
    .slot.filled{
      background:rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.16);
    }
    .slot img{
      width:92%; height:92%;
      object-fit:contain;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
    }

    .score{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      background:var(--ui);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: var(--glass);
      border-radius:999px;
      box-shadow: var(--shadow);
      min-height:44px;
      white-space:nowrap;
    }
    .score .label{ color:var(--muted); font-size:12px; }
    .score strong{ font-size:14px; letter-spacing:.2px; }

    .scene{ position:relative; flex:1; overflow:hidden; user-select:none; cursor: default; }
    .bg{
      position:absolute; inset:0;
      background:
      radial-gradient(1000px 520px at 62% 70%, rgba(0,0,0,.0), rgba(0,0,0,.38)),
        url("images/bg.png");
      background-size: cover;
      background-position: center;
      filter:saturate(1.08) contrast(1.02);
      transform: scale(1.02);
    }

    .pitWrap{
      position:absolute;
      left: var(--pit-x);
      top: var(--pit-y);
      width: var(--pit-w);
      height: var(--pit-h);
      transform: translate(-50%, -50%) perspective(900px) rotateX(56deg) rotateZ(var(--pit-tilt));
      z-index:10;
      pointer-events:none;
    }
    .pit{ position:absolute; inset:0; border-radius: 58% 42% 60% 40% / 55% 45% 58% 42%; background: transparent; }

    .hero{
      position:absolute;
      left: var(--hero-x);
      top: var(--hero-y);
      width: var(--hero-w);
      transform: translate(-50%, -50%);
      z-index:20;
      pointer-events:none;
    }
    .hero img{
      width:100%;
      height:auto;
      object-fit:contain;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,.45));
    }

    .wand{
      position:absolute;
      left: var(--wand-x);
      top: var(--wand-y);
      width: var(--wand-w);
      transform: translate(-50%, -50%) rotate(var(--wand-rot));
      z-index:40;
      pointer-events:auto;
      cursor:pointer;
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.42));
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transform-origin: 22% 78%;
    }
    .wand img{ width:100%; height:auto; object-fit:contain; pointer-events:none; }
    .wand.wiggle{ animation: wiggle 420ms var(--ease) 1; }
    @keyframes wiggle{
      0%{ transform: translate(-50%, -50%) rotate(var(--wand-rot)) rotate(0deg) translateY(0); }
      35%{ transform: translate(-50%, -50%) rotate(var(--wand-rot)) rotate(-6deg) translateY(-2px); }
      70%{ transform: translate(-50%, -50%) rotate(var(--wand-rot)) rotate(5deg) translateY(1px); }
      100%{ transform: translate(-50%, -50%) rotate(var(--wand-rot)) rotate(0deg) translateY(0); }
    }

    .deepItem{
      position:absolute;
      width: 38px;
      opacity: 1;
      transform: translate(-50%,-50%) scale(1);
      z-index:16;
      pointer-events:none;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.25));
      will-change: transform, left, top;
    }
    .deepItem img{ width:100%; height:auto; object-fit:contain; }
    .captured{
      z-index:30;
      opacity:1 !important;
      filter: drop-shadow(0 18px 18px rgba(0,0,0,.35));
      pointer-events:none;
    }

    svg#lineLayer{ position:absolute; inset:0; z-index:15; pointer-events:none; overflow:visible; }
    .linePath{ fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .lineMain{ stroke: var(--gold); stroke-width: 2.2; filter: drop-shadow(0 0 10px rgba(255, 200, 90, .55)); }
    .lineGlow{ stroke: var(--goldGlow); stroke-width: 9.5; filter: blur(1.05px); }

    .ripple{
      position:absolute; z-index:26; pointer-events:none;
      width:18px; height:18px; border-radius:999px;
      border:2px solid rgba(255, 212, 102, .55);
      box-shadow: 0 0 22px rgba(255, 200, 90, .22);
      opacity:0; transform: translate(-50%,-50%) scale(.2);
      will-change: transform, opacity;
    }
    .ripple.play{ animation: ripple 900ms var(--ease) 1; }
    @keyframes ripple{
      0%{ opacity:0; transform: translate(-50%,-50%) scale(.2); }
      18%{ opacity:.95; }
      100%{ opacity:0; transform: translate(-50%,-50%) scale(7.4); }
    }
    .splash{
      position:absolute; z-index:27; pointer-events:none;
      width:10px; height:10px; border-radius:999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255, 212, 102,.0) 70%);
      box-shadow: 0 0 18px rgba(255, 200, 90,.22);
      opacity:0; transform: translate(-50%,-50%) scale(.6);
      will-change: transform, opacity;
    }

    .overlay{
      position:absolute; inset:0;
      background: rgba(0,0,0,.46);
      z-index:80;
      display:none;
      align-items:center; justify-content:center;
      padding:18px;
    }
    .overlay.on{ display:flex; }
    .modal{
      width:min(560px, 100%);
      border-radius: 22px;
      background: rgba(18,22,34,.74);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      overflow:hidden;
      position:relative;
    }
    .modalTop{
      padding:14px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .modalTop strong{ font-size:14px; letter-spacing:.2px; }
    .xBtn{
      width:34px; height:34px; border-radius:999px;
      display:grid; place-items:center;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(240, 158, 58,.06);
      color: rgba(255,255,255,.9);
      cursor:pointer;
      line-height:1;
      font-size:16px;
    }
    .xBtn:hover{ background: rgba(255,255,255,.10); }
    .modalBody{ padding:16px 18px 16px 26px; }
    .q{ font-size:18px; line-height:1.4; margin:0 0 12px; }
    .q code{
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:3px 10px;
      border-radius: 12px;
      font-family: inherit;
      font-size: .96em;
      display:inline-block;
      margin-top:8px;
    }
    .answerRow{ display:flex; gap:10px; flex-wrap:wrap; }
    .answerRow input{
      flex:1; min-width:180px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline:none;
      font-size:16px;
    }
    button.primary{
      appearance:none; border:0; cursor:pointer;
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      background: linear-gradient(135deg, rgba(255, 212, 102,.30), rgba(235, 91, 235,.14));
      border:1px solid rgba(255, 212, 102,.30);
      transition: transform 140ms var(--ease);
      touch-action: manipulation;
    }
    button.primary:active{ transform: translateY(1px) scale(.99); }
    .feedback{ margin-top:10px; font-size:13px; color: var(--muted); min-height:18px; }
    .feedback.good{ color: rgba(54,210,124,.95); }
    .feedback.bad{ color: rgba(255,77,109,.95); }

    .toast{
      position:absolute;
      left:50%;
      top: calc(var(--hud-h) + 10px);
      transform: translateX(-50%);
      z-index:85;
      padding:10px 14px;
      border-radius: 999px;
      background: rgba(18,22,34,.72);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      color: rgba(255,255,255,.92);
      font-size:14px;
      opacity:0;
      pointer-events:none;
    }

    .flyIcon{
      position:absolute;
      width:40px; height:40px;
      transform: translate(-50%,-50%);
      pointer-events:none;
      z-index:120;
      filter:
        drop-shadow(0 0 10px rgba(255, 212, 102, .35))
        drop-shadow(0 16px 18px rgba(0,0,0,.35));
    }
    .flyIcon img{
      width:100%; height:100%; object-fit:contain;
      filter:
        drop-shadow(0 0 0.5px rgba(255,255,255,.45))
        drop-shadow(0 0 10px rgba(255, 212, 102, .55))
        drop-shadow(0 0 18px rgba(255, 170, 0, .25));
    }

    .startScreen{
      position:absolute; inset:0;
      z-index:110;
      display:flex;
      align-items:center; justify-content:center;
      padding:18px;
      background: radial-gradient(1000px 520px at 50% 45%, rgba(0,0,0,.20), rgba(0,0,0,.72));
    }
    .startCard{
      width:min(560px, 100%);
      border-radius: 22px;
      background: rgba(18,22,34,.78);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      overflow:hidden;
      text-align:center;
    }
    .startCard .body{ padding:26px 18px 22px; }
    .startCard h1{ margin:0 0 16px; font-size:30px; letter-spacing:.3px; }

    .screen{
      position:absolute; inset:0;
      z-index:95;
      display:none;
      align-items:center; justify-content:center;
      padding:18px;
      background: radial-gradient(1000px 520px at 50% 45%, rgba(0,0,0,.18), rgba(0,0,0,.68));
    }
    .screen.on{ display:flex; }
    .card{
      width:min(520px, 100%);
      border-radius: 22px;
      background: rgba(18,22,34,.78);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      overflow:hidden;
      text-align:center;
    }
    .card .body{ padding:20px 16px; }
    .card h2{ margin:0 0 14px; font-size:24px; letter-spacing:.3px; }

    @media (max-width: 980px){
      :root{
        --hero-w: 300px;
        --wand-w: 84px;
        --pit-w: 1040px;
        --pit-h: 640px;
        --pit-x: 92%;
        --pit-y: 90%;
        --wand-y: 90%;
      }
      .slot{ width:30px; height:30px; border-radius:11px; }
    }
    @media (max-width: 520px){
      :root{
        --hud-h: 74px;
        --hero-w: 250px;
        --wand-w: 78px;
        --pit-w: 920px;
        --pit-h: 580px;
        --pit-x: 92%;
        --pit-y: 92%;
        --wand-y: 92%;
      }
      .hud{ padding:10px 12px; }
      .collection .title{ display:none; }
    }
 .modal, .modal *{
      font-family: "Roboto Condensed", "Roboto", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    .modal input,
    .modal button{
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div class="rightHud">
        <div class="score" aria-label="Счёт">
          <div class="label">Score</div>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="collection">
          <div class="title">Collection</div>
          <div class="slots" id="slots"></div>
        </div>
        <div class="pill">
          <div>
            <div class="label">Mistakes</div>
            <div class="hearts" id="hearts"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="scene" id="scene">
      <div class="bg"></div>
      <div class="pitWrap"><div class="pit"></div></div>

      <svg id="lineLayer"></svg>

      <div class="hero" id="hero">
        <img alt="hero" src="images/hero.png" />
      </div>

      <div class="wand" id="wand" role="button" aria-label="Забросить удочку" tabindex="0">
        <img alt="wand" src="images/wand.png" />
      </div>

      <div class="toast" id="toast"></div>

      <div class="startScreen" id="startScreen" aria-hidden="false">
        <div class="startCard">
          <div class="body">
            <h1>Present Simple (3rd person singular)</h1>
            <button class="primary" id="startBtn">START</button>
          </div>
        </div>
      </div>

      <div class="overlay" id="overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modalTop">
            <strong>Task</strong>
            <button class="xBtn" id="closeModal" aria-label="Закрыть">×</button>
          </div>
          <div class="modalBody">
            <p class="q" id="questionText"></p>
            <div class="answerRow">
              <input id="answerInput" placeholder="write the correct answer" autocomplete="off" />
              <button class="primary" id="submitAnswer">OK</button>
            </div>
            <div class="feedback" id="feedback"></div>
          </div>
        </div>
      </div>

      <div class="screen" id="gameover">
        <div class="card">
          <div class="body">
            <h2>Game over</h2>
            <button class="primary" id="restartBtn">Restart</button>
          </div>
        </div>
      </div>

      <div class="screen" id="win">
        <div class="card">
          <div class="body">
            <h2>Amazing!</h2>
            <button class="primary" id="playAgainBtn">Play again?</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const ASSETS = {
      items: [
        "images/item1.png",
        "images/item2.png",
        "images/item3.png",
      ],
    };

    const TASKS = [
  { prompt: "Anna ___ to school by bus every day. (go)", answer: "goes" },
  { prompt: "My brother ___ coffee in the morning. (drink)", answer: "drinks" },
  { prompt: "She ___ in a small office near the station. (work)", answer: "works" },
  { prompt: "He ___ TV in the evening. (not watch)", answer: "doesn't watch" },
  { prompt: "My father ___ meat. (not eat)", answer: "doesn't eat" },
  { prompt: "The cat ___ on the sofa all day. (sleep)", answer: "sleeps" },
  { prompt: "___ your sister ___ tennis on Saturdays? (play)", answer: "Does,play" },
  { prompt: "___ he ___ in a big house? (live)", answer: "Does,live" },
  { prompt: "Why ___ Maria ___ to bed so late? (go)", answer: "does,go" },
  { prompt: "What time ___ the film ___? (start)", answer: "does,start" },
];

    const scene = document.getElementById("scene");
    const overlay = document.getElementById("overlay");
    const closeModal = document.getElementById("closeModal");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitAnswer = document.getElementById("submitAnswer");
    const feedback = document.getElementById("feedback");

    const heartsWrap = document.getElementById("hearts");
    const slotsWrap = document.getElementById("slots");

    const scoreValue = document.getElementById("scoreValue");
    const toast = document.getElementById("toast");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");

    const heroEl = document.getElementById("hero");

    const gameover = document.getElementById("gameover");
    const restartBtn = document.getElementById("restartBtn");

    const win = document.getElementById("win");
    const playAgainBtn = document.getElementById("playAgainBtn");

    const wandEl = document.getElementById("wand");
    const lineLayer = document.getElementById("lineLayer");

    const maxMistakes = 3;
    let mistakes = 0;

    const TOTAL_QUESTIONS = 10;
    let answeredCorrect = 0;

    let score = 0;
    let started = false;

    const State = Object.freeze({
      IDLE: "idle",
      CATCHING: "catching",
      MODAL: "modal",
      DROPPING: "dropping",
      FLYING: "flying",
      SPECIAL: "special",
      END: "end",
    });
    let state = State.IDLE;

    let currentTask = null;
    let capturedEl = null;
    let capturedObj = null;

    const DEEP_COUNT = 15;
    const deepItems = [];

    const BONUS_TOTAL = 3;
    const PRAISE_TOTAL = 2;
    let bonusLeft = BONUS_TOTAL;
    let praiseLeft = PRAISE_TOTAL;

    let castP1 = null;
    let castP2 = null;
    let cancelLineAnim = null;

    let opToken = 0;

    let taskBag = [];
    let cooldown = [];
    let catchCounter = 0;

    function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
    function nextOp(){ opToken++; return opToken; }
    function isOp(t){ return t === opToken; }
    function lockTo(newState){ state = newState; }

    function setHearts(){
      heartsWrap.innerHTML = "";
      for(let i=0;i<maxMistakes;i++){
        const d = document.createElement("div");
        d.className = "heart" + (i < mistakes ? " on":"");
        heartsWrap.appendChild(d);
      }
    }

    function setSlots(){
      slotsWrap.innerHTML = "";
      for(let i=0;i<TOTAL_QUESTIONS;i++){
        const s = document.createElement("div");
        s.className = "slot" + (i < answeredCorrect ? " filled" : "");
        if(i < answeredCorrect){
          const img = document.createElement("img");
          img.src = ASSETS.items[i % 3];
          img.alt = "collected";
          s.appendChild(img);
        }
        slotsWrap.appendChild(s);
      }
    }

    function setScore(){ scoreValue.textContent = String(score); }
    function normalizeAnswer(v){ return String(v || "").trim().toLowerCase().replace(/\./g,""); }

    function clearLine(){
      castP1 = null;
      castP2 = null;
      if (cancelLineAnim){
        cancelLineAnim();
        cancelLineAnim = null;
      }
      lineLayer.innerHTML = "";
    }

    function clearCaptured(){
      capturedEl = null;
      capturedObj = null;
      currentTask = null;
      clearLine();
    }

    function openModal(task){
      overlay.classList.add("on");
      overlay.setAttribute("aria-hidden","false");
      feedback.textContent = "";
      feedback.className = "feedback";
      questionText.innerHTML = `Write the correct answer:<br/><code>${task.prompt}</code>`;
      answerInput.value = "";
      setTimeout(()=>answerInput.focus(), 50);
      lockTo(State.MODAL);
    }

    function closeModalNow(){
      overlay.classList.remove("on");
      overlay.setAttribute("aria-hidden","true");
    }

    function showToast(text){
      toast.textContent = text;
      toast.animate(
        [
          { opacity: 0, transform: "translateX(-50%) translateY(-8px)" },
          { opacity: 1, transform: "translateX(-50%) translateY(0px)", offset: 0.18 },
          { opacity: 1, transform: "translateX(-50%) translateY(0px)", offset: 0.78 },
          { opacity: 0, transform: "translateX(-50%) translateY(-10px)" }
        ],
        { duration: 1400, easing: "cubic-bezier(.2,.8,.2,1)" }
      );
    }

    function getHeroPullPoint(){
      const hr = heroEl.getBoundingClientRect();
      const sr = scene.getBoundingClientRect();
      return {
        x: (hr.left - sr.left) + hr.width * 0.58,
        y: (hr.top - sr.top) + hr.height * 0.64
      };
    }

    function getWandTip(){
      const wr = wandEl.getBoundingClientRect();
      const sr = scene.getBoundingClientRect();
      return {
        x: (wr.left - sr.left) + wr.width * 0.92,
        y: (wr.top - sr.top) + wr.height * 0.25
      };
    }

    function getPitRect(){
      const pitWrap = document.querySelector(".pitWrap");
      const r = pitWrap.getBoundingClientRect();
      const sr = scene.getBoundingClientRect();
      return { left: r.left - sr.left, top: r.top - sr.top, width: r.width, height: r.height };
    }

    function randItemType(){ return Math.floor(Math.random()*3); }

    function setLineSvgSize(){
      lineLayer.setAttribute("width", scene.clientWidth);
      lineLayer.setAttribute("height", scene.clientHeight);
      lineLayer.setAttribute("viewBox", `0 0 ${scene.clientWidth} ${scene.clientHeight}`);
    }

    function makeCastPath(p1, p2, t = 0){
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;

      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const dist = Math.hypot(dx, dy);

      const sag = -Math.min(220, Math.max(80, dist * 0.35));
      const wave = Math.sin(t * 0.018) * Math.min(22, dist * 0.06);

      const nx = dist ? (-dy / dist) : 0;

      const cx = midX + nx * wave;
      const cy = midY + sag;

      const c1x = (p1.x + cx) / 2;
      const c1y = (p1.y + cy) / 2;

      const c2x = (p2.x + cx) / 2;
      const c2y = (p2.y + cy) / 2;

      return `M ${p1.x} ${p1.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
    }

    function setCastLine(on){
      lineLayer.innerHTML = "";
      if(!on) return;
      setLineSvgSize();

      const ns = "http://www.w3.org/2000/svg";
      const glow = document.createElementNS(ns, "path");
      glow.setAttribute("class", "linePath lineGlow");

      const main = document.createElementNS(ns, "path");
      main.setAttribute("class", "linePath lineMain");

      lineLayer.appendChild(glow);
      lineLayer.appendChild(main);

      let raf = 0;
      const start = performance.now();

      const tick = (now) => {
        const tt = now - start;
        if (!castP1 || !castP2) return;
        const d = makeCastPath(castP1, castP2, tt);
        glow.setAttribute("d", d);
        main.setAttribute("d", d);
        raf = requestAnimationFrame(tick);
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }

    function addRipple(x,y){
      const r = document.createElement("div");
      r.className = "ripple";
      r.style.left = x + "px";
      r.style.top = y + "px";
      scene.appendChild(r);
      requestAnimationFrame(()=> r.classList.add("play"));
      setTimeout(()=> r.remove(), 980);
    }

    function addSplash(x,y){
      for(let i=0;i<10;i++){
        const d = document.createElement("div");
        d.className = "splash";
        d.style.left = x + "px";
        d.style.top = y + "px";
        scene.appendChild(d);

        const ang = (-Math.PI/2) + (Math.random() * Math.PI);
        const dist = 22 + Math.random() * 64;
        const dx = Math.cos(ang) * dist;
        const dy = Math.sin(ang) * dist;
        const dur = 520 + Math.random()*260;

        d.animate([
          { transform: "translate(-50%,-50%) scale(.6)", opacity: 0 },
          { transform: "translate(-50%,-50%) scale(1.05)", opacity: 1, offset: 0.20 },
          { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(.2)`, opacity: 0 }
        ], { duration: dur, easing: "cubic-bezier(.2,.8,.2,1)", fill:"forwards" });

        setTimeout(()=> d.remove(), dur + 50);
      }
    }

    function pickEventKind(){
      if (bonusLeft > 0 && Math.random() < 0.18) return "bonus";
      if (praiseLeft > 0 && Math.random() < 0.14) return "praise";
      return "task";
    }

    function initTaskBag(){
      taskBag = TASKS.map(t => ({...t}));
      cooldown = [];
      catchCounter = 0;
    }

    function releaseCooldownIfNeeded(){
      const ready = [];
      const rest = [];
      for(const c of cooldown){
        if(c.releaseAtCatch <= catchCounter) ready.push(c.task);
        else rest.push(c);
      }
      cooldown = rest;
      for(const t of ready) taskBag.push(t);
    }

    function takeTask(){
      releaseCooldownIfNeeded();
      if(taskBag.length === 0){
        if(cooldown.length){
          cooldown.sort((a,b)=>a.releaseAtCatch-b.releaseAtCatch);
          const c = cooldown.shift();
          return c.task;
        }
        return {...TASKS[Math.floor(Math.random()*TASKS.length)]};
      }
      const idx = Math.floor(Math.random() * taskBag.length);
      return taskBag.splice(idx,1)[0];
    }

    function skipTask(task){
      const delay = 3;
      cooldown.push({ task, releaseAtCatch: catchCounter + delay });
    }

    function assignPayloadForCatch(obj){
      const kind = pickEventKind();
      obj.payloadKind = kind;

      if (kind === "bonus"){
        bonusLeft--;
        obj.payload = { points: 10, text: "+10!" };
        return;
      }
      if (kind === "praise"){
        praiseLeft--;
        obj.payload = { text: "Keep going!" };
        return;
      }

      const task = takeTask();
      obj.payload = { task };
    }

    function getFocusedWaterRect(){
      const topHud = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--hud-h")) || 86;

      const focus = {
        left: scene.clientWidth * 0.55,
        top: Math.max(topHud, scene.clientHeight * 0.55),
        right: scene.clientWidth * 0.98,
        bottom: scene.clientHeight * 0.98,
      };

      const pitR = getPitRect();
      const pitBox = {
        left: pitR.left,
        top: pitR.top,
        right: pitR.left + pitR.width,
        bottom: pitR.top + pitR.height,
      };

      const left = Math.max(focus.left, pitBox.left);
      const top = Math.max(focus.top, pitBox.top);
      const right = Math.min(focus.right, pitBox.right);
      const bottom = Math.min(focus.bottom, pitBox.bottom);

      if (right - left < 220 || bottom - top < 220){
        return focus;
      }
      return { left, top, right, bottom };
    }

    function createDeepItems(){
      deepItems.forEach(o => o.el.remove());
      deepItems.length = 0;

      const vw = getFocusedWaterRect();
      const padX = 50;
      const padY = 50;

      const minX = vw.left + padX;
      const maxX = vw.right - padX;
      const minY = vw.top + padY;
      const maxY = vw.bottom - padY;

      for(let i=0;i<DEEP_COUNT;i++){
        const el = document.createElement("div");
        el.className = "deepItem";

        const img = document.createElement("img");
        img.src = ASSETS.items[randItemType()];
        img.alt = "deep item";
        el.appendChild(img);

        const x = minX + Math.random() * Math.max(1, (maxX - minX));
        const y = minY + Math.random() * Math.max(1, (maxY - minY));

        el.style.left = x + "px";
        el.style.top = y + "px";

        scene.appendChild(el);

        deepItems.push({
          el,
          baseX: x,
          baseY: y,
          phase: Math.random()*Math.PI*2,
          ampX: 8 + Math.random()*14,
          ampY: 6 + Math.random()*12,
          speed: 0.35 + Math.random()*0.65,
          captured: false,
          payloadKind: null,
          payload: null,
          originX: x,
          originY: y,
        });
      }
    }

    function floatLoop(t){
      const vw = getFocusedWaterRect();
      const padX = 50;
      const padY = 50;

      const minX = vw.left + padX;
      const maxX = vw.right - padX;
      const minY = vw.top + padY;
      const maxY = vw.bottom - padY;

      for(const o of deepItems){
        if(o.captured) continue;

        const dx = Math.cos(t*0.001*o.speed + o.phase) * o.ampX;
        const dy = Math.sin(t*0.001*o.speed + o.phase) * o.ampY;

        const x = clamp(o.baseX + dx, minX, maxX);
        const y = clamp(o.baseY + dy, minY, maxY);

        o.el.style.left = x + "px";
        o.el.style.top = y + "px";
      }
      requestAnimationFrame(floatLoop);
    }

    function createOneReplacement(){
      if(gameover.classList.contains("on") || win.classList.contains("on")) return;

      const vw = getFocusedWaterRect();
      const padX = 50;
      const padY = 50;

      const minX = vw.left + padX;
      const maxX = vw.right - padX;
      const minY = vw.top + padY;
      const maxY = vw.bottom - padY;

      const el = document.createElement("div");
      el.className = "deepItem";

      const img = document.createElement("img");
      img.src = ASSETS.items[randItemType()];
      img.alt = "deep item";
      el.appendChild(img);

      const x = minX + Math.random() * Math.max(1, (maxX - minX));
      const y = minY + Math.random() * Math.max(1, (maxY - minY));

      el.style.left = x + "px";
      el.style.top = y + "px";
      scene.appendChild(el);

      deepItems.push({
        el,
        baseX: x,
        baseY: y,
        phase: Math.random()*Math.PI*2,
        ampX: 8 + Math.random()*14,
        ampY: 6 + Math.random()*12,
        speed: 0.35 + Math.random()*0.65,
        captured: false,
        payloadKind: null,
        payload: null,
        originX: x,
        originY: y,
      });
    }

    function flyToSlot(fromEl, slotIndex){
      const slotEl = slotsWrap.children[slotIndex];
      if (!slotEl) return Promise.resolve();

      const sr = scene.getBoundingClientRect();
      const fr = fromEl.getBoundingClientRect();
      const tr = slotEl.getBoundingClientRect();

      const startX = (fr.left - sr.left) + fr.width/2;
      const startY = (fr.top - sr.top) + fr.height/2;

      const endX = (tr.left - sr.left) + tr.width/2;
      const endY = (tr.top - sr.top) + tr.height/2;

      const fly = document.createElement("div");
      fly.className = "flyIcon";

      const img = document.createElement("img");
      const src = fromEl.querySelector("img")?.src;
      if (src) img.src = src;
      img.alt = "fly";
      fly.appendChild(img);

      fly.style.left = `${startX}px`;
      fly.style.top = `${startY}px`;
      scene.appendChild(fly);

      const dx = endX - startX;
      const dy = endY - startY;

      const dur = 1100;
      const midX = startX + dx * 0.55;
      const midY = startY + dy * 0.45 - Math.min(150, Math.max(80, Math.hypot(dx,dy)*0.22));

      const a = fly.animate([
        { offset: 0, left: `${startX}px`, top: `${startY}px`, transform: "translate(-50%,-50%) scale(1)", opacity: 1 },
        { offset: 0.60, left: `${midX}px`, top: `${midY}px`, transform: "translate(-50%,-50%) scale(0.95)", opacity: 1 },
        { offset: 1, left: `${endX}px`, top: `${endY}px`, transform: "translate(-50%,-50%) scale(0.42)", opacity: 0.0 }
      ], { duration: dur, easing: "cubic-bezier(.2,.8,.2,1)", fill:"forwards" });

      return a.finished.catch(()=>{}).then(()=> fly.remove());
    }

    function collectSpecial(){
      if (!capturedEl || !capturedEl.isConnected) {
        clearCaptured();
        lockTo(State.IDLE);
        return;
      }
      lockTo(State.SPECIAL);

      const tok = nextOp();
      capturedEl.animate([
        { transform: capturedEl.style.transform || "translate(-50%,-50%) scale(2.6)", opacity: 1 },
        { transform: "translate(-50%,-50%) scale(.2)", opacity: 0 }
      ], { duration: 520, easing: "cubic-bezier(.2,.8,.2,1)", fill:"forwards" });

      setTimeout(() => {
        if(!isOp(tok)) return;
        if(capturedEl && capturedEl.isConnected) capturedEl.remove();
        clearCaptured();
        createOneReplacement();
        lockTo(State.IDLE);
      }, 540);
    }

    function doPayloadAfterCatch(){
      if(!capturedObj) return;

      if(capturedObj.payloadKind === "bonus"){
        score += capturedObj.payload.points;
        setScore();
        showToast(capturedObj.payload.text);
        setTimeout(() => collectSpecial(), 260);
        return;
      }

      if(capturedObj.payloadKind === "praise"){
        showToast(capturedObj.payload.text);
        setTimeout(() => collectSpecial(), 260);
        return;
      }

      currentTask = capturedObj.payload.task;
      openModal(currentTask);
    }

    function captureItem(obj){
      if(!started) return;
      if(state !== State.IDLE) return;
      if(gameover.classList.contains("on") || win.classList.contains("on")) return;

      lockTo(State.CATCHING);

      catchCounter++;

      obj.captured = true;
      capturedObj = obj;
      capturedEl = obj.el;

      obj.originX = obj.baseX;
      obj.originY = obj.baseY;

      assignPayloadForCatch(obj);

      wandEl.classList.remove("wiggle");
      void wandEl.offsetWidth;
      wandEl.classList.add("wiggle");

      const p1 = getWandTip();
      castP1 = p1;

      const sr = scene.getBoundingClientRect();
      const r = obj.el.getBoundingClientRect();
      castP2 = { x: (r.left - sr.left) + r.width/2, y: (r.top - sr.top) + r.height/2 };

      if (cancelLineAnim){ cancelLineAnim(); cancelLineAnim = null; }
      cancelLineAnim = setCastLine(true);

      const startX = parseFloat(obj.el.style.left);
      const startY = parseFloat(obj.el.style.top);

      const pull = getHeroPullPoint();
      const endX = startX + (pull.x - startX) * 0.22 + (-8 + Math.random()*16);
      const endY = startY - 125;

      addRipple(endX, endY + 42);
      addSplash(endX, endY + 42);

      obj.el.classList.add("captured");

      const duration = 1120;
      const t0 = performance.now();
      const tok = nextOp();

      function easeInOut(v){
        return v < 0.5 ? 4*v*v*v : 1 - Math.pow(-2*v + 2, 3)/2;
      }

      function step(now){
        if(!isOp(tok)) return;
        if(state !== State.CATCHING) return;

        const tt = clamp((now - t0)/duration, 0, 1);
        const e = easeInOut(tt);

        const x = startX + (endX - startX) * e;
        const y = startY + (endY - startY) * e;

        obj.el.style.left = x + "px";
        obj.el.style.top = y + "px";

        const sc = 1 + 2.0 * e;
        obj.el.style.transform = `translate(-50%,-50%) scale(${sc})`;

        const rr = obj.el.getBoundingClientRect();
        castP2 = { x: (rr.left - sr.left) + rr.width/2, y: (rr.top - sr.top) + rr.height/2 };

        if(tt < 1){
          requestAnimationFrame(step);
        } else {
          setTimeout(() => {
            if(!isOp(tok)) return;
            clearLine();
          }, 220);

          lockTo(State.IDLE);
          doPayloadAfterCatch();
        }
      }

      requestAnimationFrame(step);
    }

    function catchRandomItem(){
      if(!started) return;
      if(state !== State.IDLE) return;
      if(overlay.classList.contains("on")) return;
      if(gameover.classList.contains("on") || win.classList.contains("on")) return;
      if(answeredCorrect >= TOTAL_QUESTIONS) return;

      const available = deepItems.filter(o => !o.captured && o.el && o.el.isConnected);
      if(!available.length) return;

      captureItem(available[Math.floor(Math.random()*available.length)]);
    }

    function dropBackToWater(){
      if(!overlay.classList.contains("on")) return;
      if(state !== State.MODAL) return;

      lockTo(State.DROPPING);
      closeModalNow();

      const tok = nextOp();

      if(!capturedObj || !capturedEl || !capturedEl.isConnected){
        clearCaptured();
        lockTo(State.IDLE);
        return;
      }

      if (capturedObj.payloadKind === "task" && capturedObj.payload && capturedObj.payload.task){
        skipTask(capturedObj.payload.task);
      }

      clearLine();

      const obj = capturedObj;
      const el = capturedEl;

      const startX = parseFloat(el.style.left);
      const startY = parseFloat(el.style.top);

      const endX = obj.originX;
      const endY = obj.originY;

      addRipple(endX, endY);
      addSplash(endX, endY);

      const duration = 650;
      const t0 = performance.now();

      function easeOut(v){ return 1 - Math.pow(1 - v, 3); }

      function step(now){
        if(!isOp(tok)) return;
        if(state !== State.DROPPING) return;

        const tt = clamp((now - t0)/duration, 0, 1);
        const e = easeOut(tt);

        const x = startX + (endX - startX) * e;
        const y = startY + (endY - startY) * e;

        el.style.left = x + "px";
        el.style.top = y + "px";

        const sc = 3 - 2 * e;
        el.style.transform = `translate(-50%,-50%) scale(${sc})`;

        if(tt < 1){
          requestAnimationFrame(step);
        } else {
          if(!el.isConnected){
            clearCaptured();
            lockTo(State.IDLE);
            return;
          }

          el.classList.remove("captured");
          el.style.transform = "translate(-50%,-50%) scale(1)";

          obj.captured = false;
          obj.baseX = endX;
          obj.baseY = endY;

          obj.payloadKind = null;
          obj.payload = null;

          clearCaptured();
          lockTo(State.IDLE);
        }
      }

      requestAnimationFrame(step);
    }

    closeModal.addEventListener("click", dropBackToWater);
    overlay.addEventListener("click", (e) => {
      if(e.target === overlay) dropBackToWater();
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        if(overlay.classList.contains("on")) dropBackToWater();
      }
      if(overlay.classList.contains("on") && e.key === "Enter"){
        submitAnswer.click();
      }
      if(!overlay.classList.contains("on") && (e.key === " " || e.key === "Enter")){
        catchRandomItem();
      }
    });

    submitAnswer.addEventListener("click", async () => {
      if(state !== State.MODAL) return;
      if(!currentTask) return;

      const user = normalizeAnswer(answerInput.value);
if(!user){
  feedback.textContent = "Type your answer";
  feedback.className = "feedback bad";
  answerInput.focus();
  return;
}
      const ok = user === normalizeAnswer(currentTask.answer);

      if(ok){
        feedback.textContent = "Correct!";
        feedback.className = "feedback good";

        const tok = nextOp();

        setTimeout(async () => {
          if(!isOp(tok)) return;
          closeModalNow();

          if(!capturedEl || !capturedEl.isConnected){
            clearCaptured();
            lockTo(State.IDLE);
            return;
          }

          lockTo(State.FLYING);

          const slotIndex = answeredCorrect;
          await flyToSlot(capturedEl, slotIndex);

          if(!isOp(tok)) return;

          if(capturedEl && capturedEl.isConnected) capturedEl.remove();
          clearCaptured();

          answeredCorrect++;
          score += 10;
          setScore();
          setSlots();

          createOneReplacement();

          if(answeredCorrect >= TOTAL_QUESTIONS){
            lockTo(State.END);
            setTimeout(() => win.classList.add("on"), 250);
          } else {
            lockTo(State.IDLE);
          }
        }, 220);

      } else {
        feedback.textContent = "Wrong!";
        feedback.className = "feedback bad";

        mistakes++;
        setHearts();

        if(mistakes >= maxMistakes){
          closeModalNow();
          if(capturedEl && capturedEl.isConnected){
            capturedEl.remove();
            clearCaptured();
          }
          lockTo(State.END);
          gameover.classList.add("on");
          return;
        }

        const tok = nextOp();

        setTimeout(() => {
          if(!isOp(tok)) return;
          closeModalNow();

          if(capturedEl && capturedEl.isConnected){
            capturedEl.animate([
              { transform: capturedEl.style.transform || "translate(-50%,-50%) scale(2.5)", opacity: 1 },
              { transform: "translate(-50%,-50%) scale(2.8)", opacity: 0 }
            ], { duration: 320, easing: "cubic-bezier(.2,.8,.2,1)", fill:"forwards" });

            setTimeout(() => {
              if(!isOp(tok)) return;
              if(capturedEl && capturedEl.isConnected) capturedEl.remove();
              clearCaptured();
              createOneReplacement();
              lockTo(State.IDLE);
            }, 340);
          } else {
            clearCaptured();
            lockTo(State.IDLE);
          }
        }, 380);
      }
    });

    function onWandActivate(e){
      e.preventDefault();
      if (!started) return;
      catchRandomItem();
    }

    wandEl.addEventListener("click", onWandActivate, { passive:false });
    wandEl.addEventListener("pointerdown", onWandActivate, { passive:false });

    startBtn.addEventListener("click", () => {
      started = true;
      startScreen.style.display = "none";
      startScreen.setAttribute("aria-hidden", "true");
    });

    function resetGame(){
      nextOp();
      mistakes = 0;
      answeredCorrect = 0;
      score = 0;

      bonusLeft = BONUS_TOTAL;
      praiseLeft = PRAISE_TOTAL;

      initTaskBag();

      closeModalNow();
      gameover.classList.remove("on");
      win.classList.remove("on");

      if(capturedEl && capturedEl.isConnected) capturedEl.remove();
      clearCaptured();

      setHearts();
      setSlots();
      setScore();

      lockTo(State.IDLE);
      createDeepItems();
    }

    restartBtn.addEventListener("click", resetGame);
    playAgainBtn.addEventListener("click", resetGame);

    setHearts();
    setSlots();
    setScore();
    initTaskBag();

    setTimeout(() => {
      createDeepItems();
      requestAnimationFrame(floatLoop);
      setLineSvgSize();
    }, 60);

    window.addEventListener("resize", () => {
      createDeepItems();
      setLineSvgSize();
    });
  </script>
</body>
</html>
